services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:///./mighty_crm.db
      SECRET_KEY: local-dev-secret-change-me
      ENVIRONMENT: local
      AUTO_CREATE_TABLES: "true"
      FRONTEND_ORIGIN: http://localhost:5173
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      PROVIDER_WEBHOOK_SECRET: local-provider-webhook-secret
      OPENCLAW_WEBHOOK_SECRET: local-openclaw-webhook-secret
    volumes:
      - ./backend:/app
    command: sh -c "python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      target: build
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
